# Market data: provider and local cache (avoids repeated API calls)
data:
  provider: "yahoo"              # "yahoo" | "alpaca" | "finnhub"
  cache_ohlcv: true
  cache_dir: "data/cache/ohlcv"
  cache_ttl_days: 0              # 0 = use cache indefinitely

# Optional: restrict the feature matrix columns returned by build_feature_matrix.
# If omitted or empty, the full feature set is returned (backward compatible).
feature_selection:
  feature_subset:
    - f_trend
    - ret_5d
    - ret_10d
    - ret_20d
    - rolling_vol_20
    - cs_momentum_percentile

# Model selection runner settings (trend_signal_engine/run_model_selection.py)
model_selection:
  max_positions: 10
  min_positions: 3
  lookahead_horizon_days: 1   # forward return horizon (1 = next day)

backtest:
  start_date: "2013-01-01"
  end_date: "2024-01-01"
  initial_capital: 100000
  max_positions: 10
  max_longs: 5
  max_shorts: 5
  holding_period_days: 3   # shorter = more turnover, more trades and days with positions
  min_holding_period_days: 5
  rebalance_every_trading_days: 5
  # Base rolling-std gate multiplier (overrides signals.signal_confidence_multiplier if both set — see load_config)
  signal_confidence_multiplier: 0.8
  signal_confidence_multiplier_sideways: 0.3
  # Cross-sectional ranking (top/bottom portfolio). When enabled, execution.enable_shorts is forced on if market_neutral.
  cross_sectional:
    enabled: false
    market_neutral: false   # long-only from top; no short leg
  #   top_longs: 5
  #   top_shorts: 5
  #   rebalance_daily: false  # if true, close positions not in today's target before opens
  #   daily_positions_csv_path: "output/portfolio/daily_positions.csv"
  # Optional: hold longer for stronger signals or by signal type (Bullish/Bearish)
  # dynamic_holding:
  #   enabled: false
  #   by_signal:    # days per signal type (fallback when no strength band matches)
  #     Bullish: 5
  #     Bearish: 3
  #   by_strength:   # [min |adjusted_score|, holding_days]; check strongest first
  #     - [0.5, 10]
  #     - [0.3, 5]

execution:
  slippage_bps: 5.0            # basis points per trade side (used when execution_costs disabled)
  commission_per_trade: 1.00   # USD flat fee per trade (used when execution_costs disabled)
  # Shorts: keep false until OOS/walk-forward vs long-only justifies (see docs/STRATEGY_SHORTS_UNIVERSE_LIVE.md).
  enable_shorts: true          # allow short trades
  long_only: false             # allow both long and short

# Transaction costs (realistic execution: when enabled, used for entry/exit cost and slippage)
execution_costs:
  enabled: true
  commission_bps: 0
  spread_bps: 0.0005   # 5 bps realistic for large-cap US equities
  slippage_bps: 0.0002 # 2 bps additional slippage
  # sensitivity_test: false
  # scenarios: [5, 10, 20]   # total bps for stress tests → output/research/cost_sensitivity.csv

# Risk and position management (see docs/INDUSTRY_ROADMAP.md for industry-level settings)
risk:
  # Industry-standard exposures (fractions of equity)
  max_gross_exposure: 1.5       # e.g., 100% long + 50% short = 150% gross
  max_net_exposure: 0.5         # cap |net| exposure (long - short) / equity
  max_short_single_name: 0.08   # cap a single short name (fraction of equity)
  short_borrow_cost_bps: 50     # annualized borrow cost (bps) modeled as daily drag in backtests
  # Bear: selective long entries + faster exits (see backtester Bear filters)
  bear_signal_window_days: 60
  bear_signal_quantile: 0.70
  bear_max_holding_days: 3
  bear_regime_intraday_exit_drawdown_pct: 0.02
  bear_skip_new_entries: false
  bear_gross_cap_fraction: 0.7
  bear_liquidate_longs_on_regime_entry: false
  # First day regime enters Crisis: cap planned exit for existing book (holdthrough fix)
  crisis_transition_accel_enabled: true
  crisis_transition_loser_max_hold_days: 0   # 0 = force exit same day (open→close path)
  crisis_transition_winner_extra_days: 3
  crisis_transition_force_close_losers_same_day: true
  # Full liquidation on first Crisis day (overrides winner/loser split). Prefer false + open exit + block crisis entries.
  crisis_transition_flatten_all: false
  crisis_transition_use_open_exit: true
  crisis_block_all_new_entries: true
  crisis_accelerated_mtm_at_open: false
  crisis_first_day_winner_mtm_at_open: false
  # Crisis day 4+ selective entries: require score >= this quantile of rolling window (day 1-3 blocked in backtester)
  crisis_signal_window_days: 60
  crisis_signal_quantile: 0.95
  position_sizing: "kelly"      # "equal" | "vol_scaled" | "kelly" — kelly = default (half-Kelly, rolling stats)
  vol_target_annual: 0.12      # target annual vol for vol_scaled sizing (10–15% typical)
  vol_lookback_days: 20        # rolling window for volatility estimate
  kelly_fraction: 0.5          # fraction of full Kelly when position_sizing="kelly"
  kelly_win_rate: 0.55         # used for Kelly (or from backtest stats)
  kelly_avg_win_return: 0.02   # average winning return
  kelly_avg_loss_return: 0.015 # average losing return (positive number)
  stop_loss_pct: 0.03          # 3% per-position stop (0 = disabled); cuts tail losses
  take_profit_pct: 0.0         # 0 = disabled; e.g. 0.05 = +5% exit
  max_position_pct_of_equity: 0.12  # max single position as fraction of equity (hard cap after beta/vol)
  max_drawdown_pct: 0.0       # disable circuit breaker (research backtest; use in live only)
  drawdown_resume_pct: 0.0
  min_holding_early_exit_drawdown_pct: 0.03
  # Live pre-flight: historical/parametric/MC VaR from OHLCV cache vs max loss fraction of equity
  var_check:
    enabled: true
    confidence: 0.95
    lookback_days: 60
    max_var_pct: 0.05
    method: "historical"       # historical | parametric | monte_carlo
    check_target: false
    strict_coverage: false
    min_weight_coverage: 0.002

# Live execution: greedy portfolio factor limits (beta / sector / single-name).
# Overrides ``risk.max_beta`` / ``max_sector_exposure`` / paths when keys are set here.
# ``max_beta`` is portfolio sum(weight * beta); ~1.0–1.3 typical for diversified long; lower = low-beta mandate.
risk_factors:
  max_beta: 1.25
  max_sector_exposure: 0.30
  max_single_name_pct: 0.08
  sector_mapping_path: "config/sector_mapping.csv"
  beta_cache_path: "output/beta_cache.csv"
  beta_lookback_days: 60
  compute_beta_on_fly: false
  # Prevent position notional from exceeding max_adv_pct of (ADV shares × price); uses OHLCV cache.
  liquidity:
    enabled: true
    max_adv_pct: 0.05           # shares_order <= max_adv_pct * ADV
    adv_lookback_days: 20
    adv_cache_path: "output/adv_cache.csv"
    refresh_cache_on_run: false # if true, recompute ADV from parquet every check (slow)

# Markowitz Mean-Variance position sizing (set enabled: true to use mv_max_sharpe / mv_min_variance)
mean_variance:
  enabled: false
  method: "max_sharpe"        # or "min_variance"
  lookback_days: 60
  rebalance_days: 20
  max_single_weight: 0.25

signals:
  # Base |adjusted_score| threshold for classifying Bullish/Bearish.
  # This now drives both static and dynamic thresholds. For learned
  # weights with small coefficients, keep this low (e.g. 0.01–0.05).
  min_signal_strength: 0.01   # low so more tickers qualify for strict validation (trades≥300, tickers≥12)
  # Skip new entry if abs(raw_score) < multiplier * rolling_60d_std(adjusted_score) per ticker (see backtester).
  # Global default; per-regime overrides below (Sideways more permissive).
  signal_confidence_multiplier: 0.8
  signal_confidence_multiplier_bull: 0.8
  signal_confidence_multiplier_sideways: 0.3
  signal_confidence_multiplier_bear: 0.8
  signal_confidence_multiplier_crisis: 0.8
  mode: "ensemble"             # "price" | "full" | "learned" | "ml" | "ensemble"
  learned_weights_path: "output/learned_weights.json"   # used when mode=learned
  ml_model_path: "output/models/best_model.pkl"
  ml_model_type: "classifier"
  ml_clip: false
  ensemble:
    models:
      - path: "output/models/logistic.pkl"
        weight: 0.4
        type: "classifier"
      - path: "output/models/xgboost.pkl"
        weight: 0.3
        type: "classifier"
      - path: "output/models/random_forest.pkl"
        weight: 0.3
        type: "classifier"
      # - path: "output/models/ridge.pkl"
      #   weight: 0.2
      #   type: "regressor"
    normalize: true
    clip: false
  weights:
    trend: 1.0
    regional_news: 0.5
    global_news: 0.4
    social: 0.3

# Factor exposure neutralization (signals adjusted to remove market/sector/size bias)
factor_neutralization:
  enabled: true
  neutralize_market_beta: true
  neutralize_sector: true
  neutralize_size: true
  # market_index: "SPY"
  # rolling_window: 60
  # factor_exposures_path: "output/research/factor_exposures.csv"
  # factor_neutralization_report_path: "output/research/factor_neutralization_report.json"

# Simulation: GBM-derived features in feature pipeline (optional; slows build)
simulation:
  gbm_enabled: false

# Monte Carlo robustness testing (randomized simulations)
monte_carlo:
  enabled: true
  runs: 500
  signal_noise: 0.02
  max_execution_delay_days: 2
  # results_path: "output/research/monte_carlo_results.csv"
  # summary_path: "output/research/monte_carlo_summary.json"
  # equity_curves_path: "output/research/monte_carlo_equity_curves.csv"
  # equity_plot_path: "output/research/monte_carlo_equity_distribution.png"
  # robustness_report_path: "output/research/monte_carlo_robustness_report.json"

regime:
  enabled: true
  # Rolling-std entry gate: threshold = signal_confidence_multiplier × σ × aggressiveness
  # (>1 = stricter). Default 1.0 = same as pre-v1.4 behavior. Sideways 2.5 filters hard (re-tune Net Sharpe).
  # Optional: Crisis: 2.0 for stricter crisis-day entries.
  threshold_aggressiveness:
    Bull: 1.0
    Bear: 1.0
    Sideways: 1.0
    Crisis: 1.0
  adjustments:
    Bull:
      score_mult: 1.2
      position_scale: 1.0
    Bear:
      score_mult: 0.8
      position_scale: 0.5
    Sideways:
      score_mult: 1.0
      position_scale: 0.7
    Crisis:
      score_mult: 0.6
      position_scale: 0.5

sectors:
  enabled: false              # portfolio exposure limit per sector
  max_exposure: 0.30          # max fraction of max_positions per sector
  adjustment_enabled: false   # adjust signals by sector momentum/vol/sentiment
  momentum_weight: 0.1        # add sector momentum to adjusted score
  volatility_weight: -0.05    # subtract sector vol (reduce in high-vol sectors)
  sentiment_weight: 0.1       # add average sector sentiment

research:
  # Walk-forward validation (calendar-year windows)
  walk_forward_enabled: true
  train_years: 3
  test_years: 0.5
  step_years: 0.5
  walk_forward_windows: 4
  walk_forward_train_ratio: 0.70
  # Train weight model on train window, backtest OOS (when signals.mode=learned)
  walk_forward_train_weights: true
  walk_forward_report_path: "output/backtests/walk_forward_validation_report.csv"
  # Forward horizons for IC decay (1d, 5d, 10d, 20d); best horizon is reported with --ic-decay
  ic_decay_lags: [1, 5, 10, 20]
  # Optional: custom cost scenarios for --cost-sensitivity (else use built-in default)
  # cost_sensitivity_scenarios:
  #   - { slippage_bps: 0,  commission_per_trade: 0 }
  #   - { slippage_bps: 10, commission_per_trade: 2 }
  #   - { slippage_bps: 25, commission_per_trade: 5 }

output:
  save_trades_csv: true
  save_equity_csv: true
  equity_curve_path: "output/backtests/equity_curve.png"
  trades_csv_path: "output/backtests/trades.csv"
  equity_csv_path: "output/backtests/daily_equity.csv"
  cost_sensitivity_report_path: "output/backtests/cost_sensitivity_report.csv"

# Daily automation (run_daily_pipeline.py): orchestration and optional strict data gate.
pipeline:
  learned_weights_path: "output/learned_weights.json"
  retrain_interval_days: 30
  retrain_script: "run_retrain_baseline.py"
  pipeline_log: "output/live/pipeline.log"
  # When true: exit non-zero if OHLCV is still older than last US session after a refresh attempt.
  fail_if_cache_stale_after_refresh: false

# Periodic full retrain (run_retrain_model.py or scripts/refresh_model.sh). Daily pipeline
# may still call run_retrain_baseline.py when weights are stale (see pipeline:).
retraining:
  enabled: true
  model_type: "learned_weights"   # learned_weights | ml
  train_start_date: "2018-01-01"
  train_window_years: 5
  schedule: "monthly"              # informational; enforce via cron
  run_hour: 0                      # UTC — for your scheduler docs only
  run_minute: 0
  output_path: "output/learned_weights.json"
  scaler_output_path: "output/learned_weights_scaler.json"
  log_path: "output/live/retrain.log"
  backup_suffix: ".before_retrain"
  skip_if_trained_within_days: 0  # e.g. 25 to no-op when last success was recent
  validate_with_backtest: true
  # True OOS: last N calendar days are NOT used in ridge fit; acceptance backtests only that tail.
  # Set to 0 only for debugging (validation then overlaps training — not comparable to full-curve Sharpe).
  validation_holdout_calendar_days: 252
  # Split the OOS tail into K segments; acceptance uses mean Sharpe across them (less noisy than K=1).
  validation_walk_forward_windows: 3
  # If >0: require new>old on at least this many windows (in addition to mean ratio test below).
  accept_if_better_on_windows: 0
  # When holdout is 0, falls back to this single long window ending at train_end (overlapping).
  validation_backtest_days: 380
  min_sharpe_ratio_vs_previous: 0.85   # mean OOS Sharpe new >= ratio × mean OOS previous
  # After a successful accept, mean OOS is stored; optional extra gate vs last good deploy:
  compare_to_last_accepted_mean: false
  min_sharpe_ratio_vs_last_accepted: 0.80
  last_accepted_oos_path: "output/retraining_last_accepted_oos.json"
  alert_on_failure: true
  # Copy accepted artifacts to output/models/releases/<YYYYMMDD>/ (see docs/ARTIFACT_LAYOUT.md).
  release_snapshot_on_success: true
  releases_dir: "output/models/releases"
  # Staged deploy: keep using live weights while shadow-testing new scores in parallel — not automated here;
  # run a second checkout or copy weights + dry-run pipeline if you want a shadow week.
  # For model_type: ml, set output_path: "output/models/best_model.pkl" (or add copy step in config).

# Live broker orders: YAML toggle + env kill switch (see docs/RUNBOOK.md).
live:
  trading_enabled: true
  trading_halt_env: "TRADING_HALTED"

# Live execution: record fills vs signal reference for cost calibration (see scripts/fetch_fills.py).
slippage_tracking:
  enabled: true
  trades_file: "output/live/trades.csv"
  pending_trades_file: "output/live/trades_pending.csv"
  signal_price_source: "close"     # close | open (last OHLCV bar in cache)
  alert_threshold_bps: 10         # alert if rolling mean adverse slippage exceeds this (bps)
  rolling_trades: 20
  slippage_metrics_csv: "output/live/slippage_metrics.csv"

# Live monitoring (run_performance_tracker.py): rolling IC/Sharpe, alerts, HTML dashboard
monitoring:
  ic_rolling_window: 20
  sharpe_rolling_window: 20
  ic_alert_threshold: 0.02
  sharpe_alert_threshold: 0.0
  # Drift escalation: treat IC/Sharpe vs thresholds as paging signals; document owner + action in docs/RUNBOOK.md.
  alert_method: "print" # print | email | slack
  email_recipient: "your@email.com"
  # SMTP for email: set env SMTP_HOST, SMTP_PORT (default 587), SMTP_USER, SMTP_PASSWORD, SMTP_FROM
  slack_webhook: "https://hooks.slack.com/services/..."
  dashboard_path: "output/live/dashboard.html"
  generate_dashboard: true
  monitoring_metrics_path: "output/live/monitoring_metrics.csv"
